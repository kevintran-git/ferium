name: Publish and Release

on:
  workflow_dispatch:
  push:
    tags: "*"

jobs:
  gh-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow_conclusion: success
          workflow: build.yml
          path: ./out

      - name: Create sha256sum for Scoop
        run: sha256sum ./out/**/hopper-windows-msvc.zip | cut -d ' ' -f 1 > ./out/hopper-windows-msvc.zip.sha256

      # Remove the dots for the markdown header
      - name: MD Header
        run: echo "MD_HEADER=$(git describe --tags --abbrev=0 | sed 's/\.//g')" >> $GITHUB_ENV

      - name: Get the latest tag
        run: echo "TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: ./out/**
          name: Hopper ${{ env.TAG }}
          tag_name: ${{ env.TAG }}
          body: |
            Compiled binaries for Hopper version `${{ env.TAG }}` ([changelog](${{ github.server_url }}/${{ github.repository }}/blob/main/CHANGELOG.md#${{ env.MD_HEADER }}))

            The provided binaries are for:
            - Linux ARM without a GUI file dialogue
            - Linux ARM (aarch64 linux musl)
            - Linux without a GUI file dialogue
            - Linux (x64 linux musl)
            - macOS Apple Silicon (aarch64 darwin)
            - macOS Intel (x64 darwin)
            - GNU Windows (x64 windows gnu) (i.e. Cygwin/MinGW)
            - Windows (x64 windows msvc)

            You can install hopper by downloading and unzipping the appropriate asset, and moving the executable to ~/bin or any other folder in your path.
